<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Blog Summarizer Dashboard — View all your saved article summaries.">
    <title>Dashboard — Blog Summarizer</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📊</text></svg>">
</head>

<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header__logo">
                <span class="header__icon">📊</span>
                <h1 class="header__title">Dashboard</h1>
            </div>
            <p class="header__subtitle">All your saved article summaries</p>
            <a href="/" class="nav-link">📝 Summarize New Article</a>
        </header>

        <!-- Stats -->
        <div class="dashboard-stats" id="stats-section">
            <div class="stat-card">
                <div class="stat-card__number" id="total-count">—</div>
                <div class="stat-card__label">Total Summaries</div>
            </div>
            <div class="stat-card">
                <div class="stat-card__number" id="domains-count">—</div>
                <div class="stat-card__label">Unique Domains</div>
            </div>
            <div class="stat-card">
                <div class="stat-card__number" id="latest-date">—</div>
                <div class="stat-card__label">Latest</div>
            </div>
        </div>

        <!-- Summaries List -->
        <section id="summaries-section" class="summaries-list"></section>
    </div>

    <script src="/static/script.js"></script>
    <script>
        // Load summaries when dashboard page loads
        document.addEventListener('DOMContentLoaded', loadSummaries);
    </script>
</body>

</html>
